<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Living Kitchen - 美食投票</title>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#0f0a1a;color:#e2e8f0;min-height:100dvh;overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;
}
button{cursor:pointer;border:none;font:inherit;color:inherit;background:none}
input{font:inherit;color:inherit}

/* ── Category Colors ── */
:root{
  --cat-凉菜:#22c55e; --cat-热菜:#f97316; --cat-汤:#14b8a6;
  --cat-主食:#6366f1; --cat-甜品:#ec4899;
  --accept:#22c55e; --dislike:#ef4444; --warn:#f59e0b;
  --glass:rgba(255,255,255,.06); --glass-border:rgba(255,255,255,.1);
}

/* ── Layout ── */
#app{
  width:100%;max-width:430px;min-height:100dvh;position:relative;
  display:flex;flex-direction:column;padding:0 16px;
}

/* ── Header ── */
.header{
  text-align:center;padding:20px 0 8px;flex-shrink:0;
}
.header h1{
  font-size:1.4rem;font-weight:700;
  background:linear-gradient(135deg,#c084fc,#818cf8,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.5px;
}
.header .subtitle{font-size:.8rem;color:#94a3b8;margin-top:2px}

/* ── Screens ── */
.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex}

/* ═══ Welcome Screen ═══ */
.welcome{justify-content:center;align-items:center;gap:32px;padding:40px 0}
.welcome .logo{font-size:4rem;filter:drop-shadow(0 0 30px rgba(168,85,247,.4))}
.welcome h2{font-size:1.6rem;font-weight:700;text-align:center;line-height:1.4}
.welcome h2 span{
  background:linear-gradient(135deg,#c084fc,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.welcome p{color:#94a3b8;text-align:center;line-height:1.6;max-width:300px}
.input-group{width:100%;max-width:300px}
.input-group input{
  width:100%;padding:14px 20px;border-radius:16px;
  background:var(--glass);border:1px solid var(--glass-border);
  color:#fff;font-size:1rem;outline:none;
  transition:border-color .3s,box-shadow .3s;
}
.input-group input:focus{
  border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.2);
}
.input-group input::placeholder{color:#64748b}
.btn-primary{
  width:100%;max-width:300px;padding:14px;border-radius:16px;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  font-size:1rem;font-weight:600;color:#fff;
  box-shadow:0 4px 20px rgba(99,102,241,.4);
  transition:transform .2s,box-shadow .2s;
}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.5;pointer-events:none}

/* ═══ Vote Screen ═══ */
.vote-screen{padding-top:8px;gap:12px}

/* Progress */
.progress-bar{
  height:4px;border-radius:2px;background:rgba(255,255,255,.08);
  overflow:hidden;flex-shrink:0;
}
.progress-bar .fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,#8b5cf6,#38bdf8);
  transition:width .4s ease;
}
.progress-text{font-size:.75rem;color:#94a3b8;text-align:center;flex-shrink:0}

/* Card Stack */
.card-stack{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;min-height:340px;
  touch-action:none;
}
.card{
  position:absolute;width:100%;max-width:360px;
  background:#1e1b2e;border-radius:24px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 8px 40px rgba(0,0,0,.4);
  overflow:hidden;user-select:none;
  will-change:transform;
  transition:box-shadow .3s;
}
.card.dragging{transition:none;box-shadow:0 16px 60px rgba(0,0,0,.5)}
.card.fly-left{animation:flyLeft .4s ease-in forwards}
.card.fly-right{animation:flyRight .4s ease-in forwards}

@keyframes flyLeft{to{transform:translateX(-150%) rotate(-30deg);opacity:0}}
@keyframes flyRight{to{transform:translateX(150%) rotate(30deg);opacity:0}}

/* Card Content */
.card-emoji{
  font-size:3.5rem;text-align:center;padding:28px 0 8px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));
}
.card-name{
  font-size:1.5rem;font-weight:700;text-align:center;
  padding:0 24px;color:#fff;
}
.card-ingredients{
  display:flex;flex-wrap:wrap;gap:6px;padding:16px 20px 8px;
  justify-content:center;
}
.card-ingredients span{
  padding:4px 10px;border-radius:20px;font-size:.7rem;
  background:rgba(255,255,255,.06);color:#cbd5e1;
  border:1px solid rgba(255,255,255,.05);
}
.card-category{
  text-align:center;padding:12px 0 24px;
}
.card-category span{
  display:inline-block;padding:5px 16px;border-radius:20px;
  font-size:.75rem;font-weight:600;letter-spacing:.5px;
}

/* Swipe Overlay */
.card-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  border-radius:24px;opacity:0;pointer-events:none;
  font-size:2rem;font-weight:800;letter-spacing:2px;
  transition:opacity .1s;
}
.card-overlay.accept{background:rgba(34,197,94,.25);color:#22c55e;border:3px solid rgba(34,197,94,.5)}
.card-overlay.dislike{background:rgba(239,68,68,.25);color:#ef4444;border:3px solid rgba(239,68,68,.5)}

/* Action Buttons */
.action-buttons{
  display:flex;justify-content:center;gap:20px;padding:12px 0 8px;flex-shrink:0;
}
.action-btn{
  width:64px;height:64px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;border:2px solid rgba(255,255,255,.1);
  background:var(--glass);backdrop-filter:blur(10px);
  transition:transform .2s,border-color .2s,background .2s;
}
.action-btn:active{transform:scale(.9)}
.action-btn.dislike-btn:hover,.action-btn.dislike-btn:active{
  border-color:var(--dislike);background:rgba(239,68,68,.15);
}
.action-btn.accept-btn:hover,.action-btn.accept-btn:active{
  border-color:var(--accept);background:rgba(34,197,94,.15);
}
.swipe-hints{
  display:flex;justify-content:space-between;padding:0 20px 20px;
  font-size:.7rem;color:#475569;flex-shrink:0;
}

/* ═══ Results Screen ═══ */
.results-screen{padding:8px 0 24px;gap:16px;overflow-y:auto}
.results-header{
  text-align:center;padding:8px 0;flex-shrink:0;
}
.results-header h2{font-size:1.3rem;font-weight:700}
.stats-row{
  display:flex;justify-content:center;gap:24px;padding:8px 0;flex-shrink:0;
}
.stat{text-align:center}
.stat .num{font-size:1.5rem;font-weight:700;color:#818cf8}
.stat .label{font-size:.7rem;color:#94a3b8;margin-top:2px}

.category-section{margin-bottom:8px}
.category-title{
  font-size:.85rem;font-weight:600;padding:8px 0 6px;
  display:flex;align-items:center;gap:6px;
  border-bottom:1px solid rgba(255,255,255,.06);
  margin-bottom:6px;
}
.result-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:12px;
  background:var(--glass);margin-bottom:4px;
}
.result-item .name{flex:1;font-size:.85rem;font-weight:500}
.result-item .votes-bar{
  width:80px;height:6px;border-radius:3px;
  background:rgba(255,255,255,.06);overflow:hidden;flex-shrink:0;
}
.result-item .votes-bar .bar{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  transition:width .6s ease;
}
.result-item .vote-count{
  font-size:.8rem;font-weight:600;color:#22c55e;
  min-width:28px;text-align:right;
}
.result-item .vote-detail{
  font-size:.65rem;color:#64748b;min-width:60px;text-align:right;
}

.btn-secondary{
  padding:12px 24px;border-radius:14px;
  background:var(--glass);border:1px solid var(--glass-border);
  font-size:.9rem;font-weight:500;
  transition:transform .2s,background .2s;
}
.btn-secondary:active{transform:scale(.97);background:rgba(255,255,255,.1)}
.btn-row{display:flex;gap:10px;justify-content:center;flex-shrink:0;padding:8px 0}

/* ═══ Empty State ═══ */
.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
}
.empty-state .icon{font-size:3rem;opacity:.5}
.empty-state p{color:#64748b;text-align:center}

/* ═══ Animations ═══ */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.fade-in{animation:fadeInUp .5s ease}

/* ═══ Scrollbar ═══ */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ═══ Ingredient Picker Screen ═══ */
.ingredient-picker{
  justify-content:center;align-items:center;gap:20px;padding:20px 0;
}
.ingredient-picker h2{
  font-size:1.3rem;font-weight:700;text-align:center;
}
.ingredient-picker .picker-sub{
  color:#94a3b8;font-size:.85rem;text-align:center;margin-top:-8px;
}
.ingredient-chips{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  max-width:360px;padding:4px 0;
}
.ingredient-chip{
  padding:8px 18px;border-radius:24px;font-size:.85rem;font-weight:500;
  background:var(--glass);border:1px solid var(--glass-border);
  color:#cbd5e1;transition:all .2s;
}
.ingredient-chip:active{transform:scale(.95)}
.ingredient-chip.selected{
  background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);
  color:#ef4444;font-weight:600;
}
.custom-ingredient-wrap{
  display:flex;gap:8px;width:100%;max-width:300px;
}
.custom-ingredient-wrap input{
  flex:1;padding:10px 16px;border-radius:14px;
  background:var(--glass);border:1px solid var(--glass-border);
  color:#fff;font-size:.85rem;outline:none;
}
.custom-ingredient-wrap input:focus{border-color:#818cf8}
.custom-add-btn{
  padding:8px 16px;border-radius:14px;
  background:var(--glass);border:1px solid var(--glass-border);
  font-size:.85rem;color:#94a3b8;transition:all .2s;
}
.custom-add-btn:active{background:rgba(255,255,255,.1)}
.picker-hint{font-size:.7rem;color:#475569;text-align:center}

/* ═══ Card Warning (disliked ingredients) ═══ */
.card.has-disliked{
  border-color:rgba(239,68,68,.35);
  box-shadow:0 8px 40px rgba(0,0,0,.4),0 0 0 1px rgba(239,68,68,.15);
}
.card-warning{
  position:absolute;top:0;left:0;right:0;
  padding:6px 12px;font-size:.7rem;font-weight:600;
  color:#ef4444;background:rgba(239,68,68,.08);
  border-bottom:1px solid rgba(239,68,68,.12);
  z-index:5;letter-spacing:.3px;
}
.card-ingredients .disliked-tag{
  background:rgba(239,68,68,.2) !important;
  color:#ef4444 !important;
  border-color:rgba(239,68,68,.4) !important;
  font-weight:700;
}

/* ═══ Responsive ═══ */
@media(max-height:700px){
  .card-emoji{padding-top:16px;font-size:2.8rem}
  .card-name{font-size:1.3rem}
  .action-btn{width:56px;height:56px;font-size:1.3rem}
}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <h1>Living Kitchen</h1>
    <div class="subtitle">2026 夏季美食投票</div>
  </div>

  <!-- Welcome Screen -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome fade-in">
      <div class="logo">🍽</div>
      <h2>选出你想吃的<span>美食</span></h2>
      <p>左滑不喜欢 · 右滑我接受<br>快来为你心仪的菜品投票吧！</p>
      <div class="input-group">
        <input id="nickname-input" type="text" placeholder="输入你的昵称" maxlength="20" autocomplete="off">
      </div>
      <button class="btn-primary" id="btn-start" onclick="startVoting()">开始投票</button>
    </div>
  </div>

  <!-- Ingredient Picker Screen -->
  <div id="screen-ingredients" class="screen ingredient-picker">
    <h2>🚫 有没有不吃的食材？</h2>
    <p class="picker-sub">选好后，含这些食材的菜品会为你标注提醒，偏好也会被记录</p>
    <div class="ingredient-chips" id="ingredient-chips"></div>
    <div class="custom-ingredient-wrap">
      <input id="custom-ingredient" type="text" placeholder="其他食材..." maxlength="20">
      <button class="custom-add-btn" onclick="addCustomIngredient()">添加</button>
    </div>
    <p class="picker-hint" style="margin-top:-10px">多项用顿号隔开，如：花椒、八角</p>
    <p class="picker-hint">可跳过，直接开始投票</p>
    <button class="btn-primary" onclick="confirmIngredients()">开始投票</button>
  </div>

  <!-- Vote Screen -->
  <div id="screen-vote" class="screen vote-screen">
    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">0 / 0</div>
    <div class="card-stack" id="card-stack"></div>
    <div class="action-buttons">
      <button class="action-btn dislike-btn" onclick="voteAction('dislike')" title="不喜欢">✕</button>
      <button class="action-btn accept-btn" onclick="voteAction('accept')" title="我接受">✓</button>
    </div>
    <div class="swipe-hints">
      <span>← 不喜欢</span>
      <span>我接受 →</span>
    </div>
  </div>

  <!-- Results Screen -->
  <div id="screen-results" class="screen results-screen"></div>
</div>

<script>
// ── State ──
let userName = '';
let allDishes = [];
let remainingDishes = [];
let votedCount = 0;
let totalDishes = 0;
let isDragging = false;
let startX = 0, startY = 0, currentX = 0, currentY = 0;
let activeCard = null;
let dislikedIngredients = [];

// ── Common Disliked Ingredients ──
const COMMON_INGREDIENTS = ['香菜','彩椒','青椒','韭菜','大葱','葱','迷迭香','口蘑','蘑菇'];

// ── API ──
async function api(url, opts) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

// ── Screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ── Start Voting ──
async function startVoting() {
  const input = document.getElementById('nickname-input');
  userName = input.value.trim();
  if (!userName) {
    input.style.borderColor = '#ef4444';
    input.style.boxShadow = '0 0 0 3px rgba(239,68,68,.2)';
    input.focus();
    return;
  }
  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  btn.textContent = '加载中...';

  try {
    allDishes = await api('/api/dishes');
    remainingDishes = await api('/api/dishes/remaining?user=' + encodeURIComponent(userName));
    const myVotes = await api('/api/my-votes?user=' + encodeURIComponent(userName));
    totalDishes = allDishes.length;
    votedCount = myVotes.length;

    if (remainingDishes.length === 0) {
      showResults();
    } else {
      showScreen('ingredients');
      renderIngredientChips();
    }
  } catch (e) {
    alert('加载失败，请刷新重试');
  }
  btn.disabled = false;
  btn.textContent = '开始投票';
}

// ── Ingredient Picker ──
function renderIngredientChips() {
  const container = document.getElementById('ingredient-chips');
  container.innerHTML = COMMON_INGREDIENTS.map(ing => {
    const sel = dislikedIngredients.includes(ing) ? ' selected' : '';
    return `<button class="ingredient-chip${sel}" onclick="toggleIngredient(this,'${ing}')">${ing}</button>`;
  }).join('');
}

function toggleIngredient(el, name) {
  const idx = dislikedIngredients.indexOf(name);
  if (idx >= 0) {
    dislikedIngredients.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    dislikedIngredients.push(name);
    el.classList.add('selected');
  }
}

function addCustomIngredient() {
  const input = document.getElementById('custom-ingredient');
  const val = input.value.trim();
  if (!val) return;
  const parts = val.split('、').map(s => s.trim()).filter(Boolean);
  const container = document.getElementById('ingredient-chips');
  for (const name of parts) {
    if (!dislikedIngredients.includes(name)) {
      dislikedIngredients.push(name);
      const chip = document.createElement('button');
      chip.className = 'ingredient-chip selected';
      chip.textContent = name;
      chip.onclick = function() { toggleIngredient(this, name); };
      container.appendChild(chip);
    }
  }
  input.value = '';
  input.focus();
}

async function confirmIngredients() {
  // Save dietary preferences
  if (dislikedIngredients.length > 0) {
    try {
      await api('/api/preferences', {
        method: 'POST',
        body: JSON.stringify({ user: userName, disliked_ingredients: dislikedIngredients.join('、') })
      });
    } catch (e) {
      console.error('Failed to save preferences:', e);
    }
  }
  showScreen('vote');
  renderCardStack();
  updateProgress();
}

// ── Disliked Ingredient Match ──
function hasDislikedIngredient(dishIngredients) {
  if (dislikedIngredients.length === 0) return false;
  const parts = dishIngredients.split('、').map(s => s.trim());
  for (const part of parts) {
    for (const d of dislikedIngredients) {
      if (part.includes(d) || d.includes(part)) return true;
    }
  }
  return false;
}

// ── Progress ──
function updateProgress() {
  const done = votedCount;
  const total = totalDishes;
  const pct = total > 0 ? (done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
}

// ── Card Stack ──
function renderCardStack() {
  const stack = document.getElementById('card-stack');
  stack.innerHTML = '';
  const show = remainingDishes.slice(0, 3);
  if (show.length === 0) {
    showResults();
    return;
  }
  // Render in reverse so top card is last (highest z-index)
  for (let i = show.length - 1; i >= 0; i--) {
    const dish = show[i];
    const card = createCard(dish, i);
    stack.appendChild(card);
  }
  // Attach drag events to top card
  const topCard = stack.lastElementChild;
  if (topCard) attachDrag(topCard);
}

function createCard(dish, depth) {
  const catColor = getComputedStyle(document.documentElement)
    .getPropertyValue('--cat-' + dish.category) || '#818cf8';
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.dishId = dish.id;
  const scale = 1 - depth * 0.04;
  const ty = depth * 8;
  el.style.transform = `translateY(${ty}px) scale(${scale})`;
  el.style.zIndex = 10 - depth;

  // Build ingredient tags with disliked ingredient highlighting
  const allIngredients = dish.ingredients.split('、').map(s => s.trim()).filter(Boolean);
  const dislikedSet = new Set();
  if (dislikedIngredients.length > 0) {
    for (const ing of allIngredients) {
      for (const d of dislikedIngredients) {
        if (ing.includes(d) || d.includes(ing)) { dislikedSet.add(ing); break; }
      }
    }
  }
  // Disliked ingredients first
  const sorted = [
    ...allIngredients.filter(i => dislikedSet.has(i)),
    ...allIngredients.filter(i => !dislikedSet.has(i))
  ].slice(0, 8);
  const moreCount = allIngredients.length - 8;
  const moreTag = moreCount > 0 ? `<span>+${moreCount}</span>` : '';

  const tagHtml = sorted.map(t => {
    const cls = dislikedSet.has(t) ? ' disliked-tag' : '';
    return `<span class="${cls}">${t}</span>`;
  }).join('');

  const hasDisliked = dislikedSet.size > 0;
  if (hasDisliked) el.classList.add('has-disliked');

  el.innerHTML = `
    <div class="card-overlay accept">我接受 ✓</div>
    <div class="card-overlay dislike">不喜欢 ✕</div>
    ${hasDisliked ? '<div class="card-warning">⚠ 含有你不喜欢的食材</div>' : ''}
    <div class="card-emoji">${dish.emoji}</div>
    <div class="card-name">${dish.name}</div>
    <div class="card-ingredients">${tagHtml}${moreTag}</div>
    <div class="card-category">
      <span style="background:${catColor}22;color:${catColor};border:1px solid ${catColor}44">
        ${dish.emoji} ${dish.category}
      </span>
    </div>
  `;
  return el;
}

// ── Drag / Swipe ──
function attachDrag(card) {
  activeCard = card;
  card.addEventListener('pointerdown', onPointerDown);
}

function onPointerDown(e) {
  if (e.target.closest('.action-btn')) return;
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;
  currentX = 0;
  currentY = 0;
  activeCard.classList.add('dragging');
  activeCard.setPointerCapture(e.pointerId);
  activeCard.addEventListener('pointermove', onPointerMove);
  activeCard.addEventListener('pointerup', onPointerUp);
  activeCard.addEventListener('pointercancel', onPointerUp);
}

function onPointerMove(e) {
  if (!isDragging) return;
  currentX = e.clientX - startX;
  currentY = e.clientY - startY;
  const rotate = currentX * 0.08;
  activeCard.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg)`;

  // Show overlays
  const threshold = 40;
  const acceptOverlay = activeCard.querySelector('.card-overlay.accept');
  const dislikeOverlay = activeCard.querySelector('.card-overlay.dislike');

  acceptOverlay.style.opacity = currentX > threshold ? Math.min((currentX - threshold) / 60, 1) : 0;
  dislikeOverlay.style.opacity = currentX < -threshold ? Math.min((-currentX - threshold) / 60, 1) : 0;
}

function onPointerUp(e) {
  if (!isDragging) return;
  isDragging = false;
  activeCard.classList.remove('dragging');
  activeCard.removeEventListener('pointermove', onPointerMove);
  activeCard.removeEventListener('pointerup', onPointerUp);
  activeCard.removeEventListener('pointercancel', onPointerUp);

  const thresholdX = 80;

  if (currentX > thresholdX) {
    flyOff('right', 'accept');
  } else if (currentX < -thresholdX) {
    flyOff('left', 'dislike');
  } else {
    // Snap back
    activeCard.style.transform = 'translate(0,0) rotate(0)';
    activeCard.style.transition = 'transform .3s ease';
    activeCard.querySelectorAll('.card-overlay').forEach(o => o.style.opacity = 0);
    setTimeout(() => { if (activeCard) activeCard.style.transition = ''; }, 300);
  }
}

function flyOff(direction, voteType) {
  const card = activeCard;
  const dishId = parseInt(card.dataset.dishId);
  card.classList.add('fly-' + direction);

  // Submit vote
  submitVote(dishId, voteType);

  setTimeout(() => {
    remainingDishes.shift();
    votedCount++;
    updateProgress();
    renderCardStack();
  }, 350);
}

// ── Button Actions ──
function voteAction(voteType) {
  if (!activeCard || remainingDishes.length === 0) return;
  const dir = voteType === 'accept' ? 'right' : 'left';
  flyOff(dir, voteType);
}

// ── Submit Vote ──
async function submitVote(dishId, voteType) {
  try {
    await api('/api/vote', {
      method: 'POST',
      body: JSON.stringify({ user: userName, dish_id: dishId, vote_type: voteType })
    });
  } catch (e) {
    console.error('Vote failed:', e);
  }
}

// ── Results ──
async function showResults() {
  showScreen('results');
  const container = document.getElementById('screen-results');
  container.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>加载中...</p></div>';

  try {
    const [results, stats] = await Promise.all([
      api('/api/results'),
      api('/api/stats')
    ]);

    const maxAccepts = Math.max(1, ...results.map(r => r.accepts));

    let html = `
      <div class="results-header fade-in">
        <h2>🎉 投票结果</h2>
      </div>
      <div class="stats-row fade-in">
        <div class="stat"><div class="num">${stats.total_users}</div><div class="label">参与人数</div></div>
        <div class="stat"><div class="num">${stats.total_dishes}</div><div class="label">菜品总数</div></div>
        <div class="stat"><div class="num">${stats.total_votes}</div><div class="label">投票总数</div></div>
      </div>
    `;

    // Group by category
    const categories = ['凉菜', '热菜', '汤', '主食', '甜品'];
    const catEmoji = { '凉菜': '🥗', '热菜': '🔥', '汤': '🍲', '主食': '🍚', '甜品': '🍰' };
    const catColor = { '凉菜': '#22c55e', '热菜': '#f97316', '汤': '#14b8a6', '主食': '#6366f1', '甜品': '#ec4899' };

    for (const cat of categories) {
      const dishes = results.filter(r => r.category === cat);
      if (dishes.length === 0) continue;

      html += `<div class="category-section fade-in">
        <div class="category-title" style="color:${catColor[cat]}">
          ${catEmoji[cat]} ${cat}
        </div>`;

      for (const d of dishes) {
        const pct = d.accepts > 0 ? (d.accepts / maxAccepts * 100) : 0;
        html += `
          <div class="result-item">
            <div class="name">${d.name}</div>
            <div class="votes-bar"><div class="bar" style="width:${pct}%"></div></div>
            <div class="vote-count">${d.accepts > 0 ? '✓ ' + d.accepts : '-'}</div>
            <div class="vote-detail">${d.dislikes > 0 ? '✕' + d.dislikes : ''}</div>
          </div>`;
      }
      html += '</div>';
    }

    html += `
      <div class="btn-row fade-in">
        <button class="btn-secondary" onclick="location.reload()">重新投票</button>
      </div>
    `;

    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<div class="empty-state"><div class="icon">⚠</div><p>加载失败，请刷新重试</p></div>';
  }
}

// ── Keyboard Support ──
document.addEventListener('keydown', (e) => {
  if (document.getElementById('screen-vote').classList.contains('active')) {
    if (e.key === 'ArrowLeft') voteAction('dislike');
    else if (e.key === 'ArrowRight') voteAction('accept');
  }
});

// ── Enter to Start ──
document.getElementById('nickname-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startVoting();
});
document.getElementById('custom-ingredient').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addCustomIngredient();
});
</script>
