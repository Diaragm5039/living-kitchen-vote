<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Living Kitchen - 美食投票</title>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#0f0a1a;color:#e2e8f0;min-height:100dvh;overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;
}
button{cursor:pointer;border:none;font:inherit;color:inherit;background:none}
input{font:inherit;color:inherit}

/* ── Category Colors ── */
:root{
  --cat-凉菜:#22c55e; --cat-热菜:#f97316; --cat-汤:#14b8a6;
  --cat-主食:#6366f1; --cat-甜品:#ec4899;
  --accept:#22c55e; --dislike:#ef4444; --warn:#f59e0b;
  --glass:rgba(255,255,255,.06); --glass-border:rgba(255,255,255,.1);
}

/* ── Layout ── */
#app{
  width:100%;max-width:430px;height:100dvh;position:relative;
  display:flex;flex-direction:column;padding:0 16px;overflow:hidden;
}

/* ── Header ── */
.header{
  text-align:center;padding:20px 0 8px;flex-shrink:0;
}
.header h1{
  font-size:1.4rem;font-weight:700;
  background:linear-gradient(135deg,#c084fc,#818cf8,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.5px;
}
.header .subtitle{font-size:.8rem;color:#94a3b8;margin-top:2px}

/* ── Screens ── */
.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex;min-height:0}

/* ═══ Welcome Screen ═══ */
.welcome{justify-content:center;align-items:center;gap:32px;padding:40px 0}
.welcome .logo{font-size:4rem;filter:drop-shadow(0 0 30px rgba(168,85,247,.4))}
.welcome h2{font-size:1.6rem;font-weight:700;text-align:center;line-height:1.4}
.welcome h2 span{
  background:linear-gradient(135deg,#c084fc,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.welcome p{color:#94a3b8;text-align:center;line-height:1.6;max-width:300px}
.input-group{width:100%;max-width:300px}
.input-group input{
  width:100%;padding:14px 20px;border-radius:16px;
  background:var(--glass);border:1px solid var(--glass-border);
  color:#fff;font-size:1rem;outline:none;
  transition:border-color .3s,box-shadow .3s;
}
.input-group input:focus{
  border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.2);
}
.input-group input::placeholder{color:#64748b}
.btn-primary{
  width:100%;max-width:300px;padding:14px;border-radius:16px;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  font-size:1rem;font-weight:600;color:#fff;
  box-shadow:0 4px 20px rgba(99,102,241,.4);
  transition:transform .2s,box-shadow .2s;
}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.5;pointer-events:none}

/* ═══ Vote Screen ═══ */
.vote-screen{position:relative;overflow:hidden;padding-top:8px;gap:0}

/* Progress */
.progress-bar{
  height:4px;border-radius:2px;background:rgba(255,255,255,.08);
  overflow:hidden;flex-shrink:0;margin:0 52px;
}
.progress-bar .fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,#8b5cf6,#38bdf8);
  transition:width .4s ease;
}
.progress-text{font-size:.75rem;color:#94a3b8;text-align:center;flex-shrink:0;padding:4px 52px}

/* Side Drop Zones */
.drop-zone{
  position:absolute;top:0;bottom:0;
  width:52px;
  display:flex;align-items:center;justify-content:center;
  writing-mode:vertical-rl;
  font-size:.75rem;font-weight:700;letter-spacing:3px;
  opacity:.3;transition:opacity .3s,background .3s,box-shadow .3s;
  pointer-events:none;z-index:50;
}
.drop-zone.dislike-zone{
  left:0;border-radius:0 14px 14px 0;
  background:rgba(239,68,68,.05);color:#ef4444;
  border-right:2px solid rgba(239,68,68,.12);
}
.drop-zone.like-zone{
  right:0;border-radius:14px 0 0 14px;
  background:rgba(34,197,94,.05);color:#22c55e;
  border-left:2px solid rgba(34,197,94,.12);
}
.drop-zone.active{opacity:1}
.drop-zone.dislike-zone.active{
  background:rgba(239,68,68,.2);box-shadow:inset -4px 0 20px rgba(239,68,68,.15);
}
.drop-zone.like-zone.active{
  background:rgba(34,197,94,.2);box-shadow:inset 4px 0 20px rgba(34,197,94,.15);
}

/* Card Grid */
.card-grid{
  flex:1;overflow-y:auto;padding:8px 56px 12px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  align-content:start;
}

/* Submit Button */
.submit-bar{
  flex-shrink:0;padding:8px 56px 16px;
}
.submit-btn{
  width:100%;padding:14px;border-radius:14px;
  background:linear-gradient(135deg,#6366f1,#818cf8);
  font-size:.95rem;font-weight:600;color:#fff;
  box-shadow:0 4px 16px rgba(99,102,241,.3);
  transition:transform .2s,box-shadow .2s;
}
.submit-btn:active{transform:scale(.97)}

/* Compact Card */
.card{
  background:#1e1b2e;border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  overflow:hidden;user-select:none;
  touch-action:none;cursor:grab;
  transition:transform .2s,box-shadow .2s,opacity .2s;
}
.card:active{cursor:grabbing}
.card.dragging{
  position:fixed;z-index:200;
  box-shadow:0 16px 48px rgba(0,0,0,.6);
  opacity:.92;cursor:grabbing;
  transition:none;
}
.card.snap-back{
  transition:transform .3s ease,box-shadow .3s ease;
}

/* Compact Card Content */
.card-emoji{font-size:1.6rem;text-align:center;padding:10px 0 2px}
.card-name{
  font-size:.8rem;font-weight:600;text-align:center;
  padding:0 6px;color:#fff;line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.card-ingredients{
  display:flex;flex-wrap:wrap;gap:3px;padding:6px 6px 4px;
  justify-content:center;
}
.card-ingredients span{
  padding:1px 5px;border-radius:8px;font-size:.55rem;
  background:rgba(255,255,255,.06);color:#cbd5e1;
  border:1px solid rgba(255,255,255,.05);
  max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.card-category{text-align:center;padding:4px 0 8px}
.card-category span{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:.6rem;font-weight:600;
}

/* ═══ Results Screen ═══ */
.results-screen{padding:8px 0 24px;gap:16px;overflow-y:auto}
.results-header{
  text-align:center;padding:8px 0;flex-shrink:0;
}
.results-header h2{font-size:1.3rem;font-weight:700}
.stats-row{
  display:flex;justify-content:center;gap:24px;padding:8px 0;flex-shrink:0;
}
.stat{text-align:center}
.stat .num{font-size:1.5rem;font-weight:700;color:#818cf8}
.stat .label{font-size:.7rem;color:#94a3b8;margin-top:2px}

.category-section{margin-bottom:8px}
.category-title{
  font-size:.85rem;font-weight:600;padding:8px 0 6px;
  display:flex;align-items:center;gap:6px;
  border-bottom:1px solid rgba(255,255,255,.06);
  margin-bottom:6px;
}
.result-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:12px;
  background:var(--glass);margin-bottom:4px;
}
.result-item .name{flex:1;font-size:.85rem;font-weight:500}
.result-item .votes-bar{
  width:80px;height:6px;border-radius:3px;
  background:rgba(255,255,255,.06);overflow:hidden;flex-shrink:0;
}
.result-item .votes-bar .bar{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  transition:width .6s ease;
}
.result-item .vote-count{
  font-size:.8rem;font-weight:600;color:#22c55e;
  min-width:28px;text-align:right;
}
.result-item .vote-detail{
  font-size:.65rem;color:#64748b;min-width:60px;text-align:right;
}

.btn-secondary{
  padding:12px 24px;border-radius:14px;
  background:var(--glass);border:1px solid var(--glass-border);
  font-size:.9rem;font-weight:500;
  transition:transform .2s,background .2s;
}
.btn-secondary:active{transform:scale(.97);background:rgba(255,255,255,.1)}
.btn-row{display:flex;gap:10px;justify-content:center;flex-shrink:0;padding:8px 0}

/* ═══ Empty State ═══ */
.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
}
.empty-state .icon{font-size:3rem;opacity:.5}
.empty-state p{color:#64748b;text-align:center}

/* ═══ Animations ═══ */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.fade-in{animation:fadeInUp .5s ease}

/* ═══ Scrollbar ═══ */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ═══ Ingredient Picker Screen ═══ */
.ingredient-picker{
  justify-content:center;align-items:center;gap:20px;padding:20px 0;overflow-y:auto;
}
.ingredient-picker h2{
  font-size:1.3rem;font-weight:700;text-align:center;
}
.ingredient-picker .picker-sub{
  color:#94a3b8;font-size:.85rem;text-align:center;margin-top:-8px;
}
.ingredient-chips{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  max-width:360px;padding:4px 0;
}
.ingredient-chip{
  padding:8px 18px;border-radius:24px;font-size:.85rem;font-weight:500;
  background:var(--glass);border:1px solid var(--glass-border);
  color:#cbd5e1;transition:all .2s;
}
.ingredient-chip:active{transform:scale(.95)}
.ingredient-chip.selected{
  background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);
  color:#ef4444;font-weight:600;
}
.custom-ingredient-wrap{
  display:flex;gap:8px;width:100%;max-width:300px;
}
.custom-ingredient-wrap input{
  flex:1;padding:10px 16px;border-radius:14px;
  background:var(--glass);border:1px solid var(--glass-border);
  color:#fff;font-size:.85rem;outline:none;
}
.custom-ingredient-wrap input:focus{border-color:#818cf8}
.custom-add-btn{
  padding:8px 16px;border-radius:14px;
  background:var(--glass);border:1px solid var(--glass-border);
  font-size:.85rem;color:#94a3b8;transition:all .2s;
}
.custom-add-btn:active{background:rgba(255,255,255,.1)}
.picker-hint{font-size:.7rem;color:#475569;text-align:center}

/* ═══ Card Warning (disliked ingredients) ═══ */
.card.has-disliked{
  border-color:rgba(239,68,68,.35);
  box-shadow:0 0 0 1px rgba(239,68,68,.15);
}
.card-warning{
  text-align:center;padding:3px 4px;font-size:.55rem;font-weight:600;
  color:#ef4444;background:rgba(239,68,68,.08);
  border-bottom:1px solid rgba(239,68,68,.12);
  letter-spacing:.3px;
}
.card-ingredients .disliked-tag{
  background:rgba(239,68,68,.2) !important;
  color:#ef4444 !important;
  border-color:rgba(239,68,68,.4) !important;
  font-weight:700;
}

/* ═══ Responsive ═══ */
@media(max-height:700px){
  .card-emoji{font-size:1.3rem;padding-top:6px}
  .card-name{font-size:.75rem}
}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <h1>Living Kitchen</h1>
    <div class="subtitle">2026 夏季美食投票</div>
  </div>

  <!-- Welcome Screen -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome fade-in">
      <div class="logo">🍽</div>
      <h2>选出你想吃的<span>美食</span></h2>
      <p>拖拽菜品到左侧不喜欢 · 右侧我喜欢<br>也可以点提交跳过当前菜品</p>
      <div class="input-group">
        <input id="nickname-input" type="text" placeholder="输入你的昵称" maxlength="20" autocomplete="off">
      </div>
      <button class="btn-primary" id="btn-start" onclick="startVoting()">开始投票</button>
    </div>
  </div>

  <!-- Ingredient Picker Screen -->
  <div id="screen-ingredients" class="screen ingredient-picker">
    <h2>🚫 有没有不吃的食材？</h2>
    <p class="picker-sub">选好后，含这些食材的菜品会为你标注提醒，偏好也会被记录</p>
    <div class="ingredient-chips" id="ingredient-chips"></div>
    <div class="custom-ingredient-wrap">
      <input id="custom-ingredient" type="text" placeholder="其他食材..." maxlength="20">
      <button class="custom-add-btn" onclick="addCustomIngredient()">添加</button>
    </div>
    <p class="picker-hint" style="margin-top:-10px">多项用顿号隔开，如：花椒、八角</p>
    <p class="picker-hint">可跳过，直接开始投票</p>
    <button class="btn-primary" onclick="confirmIngredients()">开始投票</button>
  </div>

  <!-- Vote Screen -->
  <div id="screen-vote" class="screen vote-screen">
    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">0 / 0</div>
    <div class="drop-zone dislike-zone" id="zone-dislike">不喜欢 ✕</div>
    <div class="drop-zone like-zone" id="zone-like">我喜欢 ♥</div>
    <div class="card-grid" id="card-grid"></div>
    <div class="submit-bar">
      <button class="submit-btn" id="btn-submit" onclick="submitNeutral()">提交</button>
    </div>
  </div>

  <!-- Results Screen -->
  <div id="screen-results" class="screen results-screen"></div>
</div>

<script>
// ── State ──
let userName = '';
let allDishes = [];
let remainingDishes = [];
let votedCount = 0;
let totalDishes = 0;
let isDragging = false;
let startX = 0, startY = 0;
let activeCard = null;
let dislikedIngredients = [];

// ── Common Disliked Ingredients ──
const COMMON_INGREDIENTS = ['香菜','韭菜','迷迭香','菇','葱','椒'];

// ── API ──
async function api(url, opts) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

// ── Screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ── Start Voting ──
async function startVoting() {
  const input = document.getElementById('nickname-input');
  userName = input.value.trim();
  if (!userName) {
    input.style.borderColor = '#ef4444';
    input.style.boxShadow = '0 0 0 3px rgba(239,68,68,.2)';
    input.focus();
    return;
  }
  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  btn.textContent = '加载中...';

  try {
    allDishes = await api('/api/dishes');
    remainingDishes = await api('/api/dishes/remaining?user=' + encodeURIComponent(userName));
    const myVotes = await api('/api/my-votes?user=' + encodeURIComponent(userName));
    totalDishes = allDishes.length;
    votedCount = myVotes.length;

    if (remainingDishes.length === 0) {
      showResults();
    } else {
      showScreen('ingredients');
      renderIngredientChips();
    }
  } catch (e) {
    alert('加载失败，请刷新重试');
  }
  btn.disabled = false;
  btn.textContent = '开始投票';
}

// ── Ingredient Picker ──
function renderIngredientChips() {
  const container = document.getElementById('ingredient-chips');
  container.innerHTML = COMMON_INGREDIENTS.map(ing => {
    const sel = dislikedIngredients.includes(ing) ? ' selected' : '';
    return `<button class="ingredient-chip${sel}" onclick="toggleIngredient(this,'${ing}')">${ing}</button>`;
  }).join('');
}

function toggleIngredient(el, name) {
  const idx = dislikedIngredients.indexOf(name);
  if (idx >= 0) {
    dislikedIngredients.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    dislikedIngredients.push(name);
    el.classList.add('selected');
  }
}

function addCustomIngredient() {
  const input = document.getElementById('custom-ingredient');
  const val = input.value.trim();
  if (!val) return;
  const parts = val.split('、').map(s => s.trim()).filter(Boolean);
  const container = document.getElementById('ingredient-chips');
  for (const name of parts) {
    if (!dislikedIngredients.includes(name)) {
      dislikedIngredients.push(name);
      const chip = document.createElement('button');
      chip.className = 'ingredient-chip selected';
      chip.textContent = name;
      chip.onclick = function() { toggleIngredient(this, name); };
      container.appendChild(chip);
    }
  }
  input.value = '';
  input.focus();
}

async function confirmIngredients() {
  // Save dietary preferences
  if (dislikedIngredients.length > 0) {
    try {
      await api('/api/preferences', {
        method: 'POST',
        body: JSON.stringify({ user: userName, disliked_ingredients: dislikedIngredients.join('、') })
      });
    } catch (e) {
      console.error('Failed to save preferences:', e);
    }
  }
  showScreen('vote');
  renderCardGrid();
  updateProgress();
}

// ── Disliked Ingredient Match ──
function hasDislikedIngredient(dishIngredients) {
  if (dislikedIngredients.length === 0) return false;
  const parts = dishIngredients.split('、').map(s => s.trim());
  for (const part of parts) {
    for (const d of dislikedIngredients) {
      if (part.includes(d) || d.includes(part)) return true;
    }
  }
  return false;
}

// ── Progress ──
function updateProgress() {
  const done = votedCount;
  const total = totalDishes;
  const pct = total > 0 ? (done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
}

// ── Card Grid ──
function renderCardGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  if (remainingDishes.length === 0) {
    showResults();
    return;
  }
  for (const dish of remainingDishes) {
    grid.appendChild(createCard(dish));
  }
}

function createCard(dish) {
  const catColor = getComputedStyle(document.documentElement)
    .getPropertyValue('--cat-' + dish.category) || '#818cf8';
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.dishId = dish.id;

  // Build ingredient tags with disliked ingredient highlighting
  const allIngredients = dish.ingredients.split('、').map(s => s.trim()).filter(Boolean);
  const dislikedSet = new Set();
  if (dislikedIngredients.length > 0) {
    for (const ing of allIngredients) {
      for (const d of dislikedIngredients) {
        if (ing.includes(d) || d.includes(ing)) { dislikedSet.add(ing); break; }
      }
    }
  }
  // Disliked ingredients first, max 5 tags for compact card
  const sorted = [
    ...allIngredients.filter(i => dislikedSet.has(i)),
    ...allIngredients.filter(i => !dislikedSet.has(i))
  ].slice(0, 5);
  const moreCount = allIngredients.length - 5;
  const moreTag = moreCount > 0 ? `<span>+${moreCount}</span>` : '';

  const tagHtml = sorted.map(t => {
    const cls = dislikedSet.has(t) ? ' disliked-tag' : '';
    return `<span class="${cls}">${t}</span>`;
  }).join('');

  const hasDisliked = dislikedSet.size > 0;
  if (hasDisliked) el.classList.add('has-disliked');

  el.innerHTML = `
    ${hasDisliked ? '<div class="card-warning">⚠ 忌口</div>' : ''}
    <div class="card-emoji">${dish.emoji}</div>
    <div class="card-name">${dish.name}</div>
    <div class="card-ingredients">${tagHtml}${moreTag}</div>
    <div class="card-category">
      <span style="background:${catColor}22;color:${catColor};border:1px solid ${catColor}44">
        ${dish.category}
      </span>
    </div>
  `;

  // Drag handlers
  el.addEventListener('pointerdown', onDragStart);
  return el;
}

// ── Drag to Zone ──
function onDragStart(e) {
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();

  activeCard = card;
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;

  // Fix card at its current screen position
  card.style.position = 'fixed';
  card.style.left = rect.left + 'px';
  card.style.top = rect.top + 'px';
  card.style.width = rect.width + 'px';
  card.style.zIndex = '200';
  card.classList.add('dragging');

  card.setPointerCapture(e.pointerId);
  card.addEventListener('pointermove', onDragMove);
  card.addEventListener('pointerup', onDragEnd);
  card.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e) {
  if (!isDragging || !activeCard) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  activeCard.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx * 0.05}deg)`;

  // Check which drop zone the pointer is over
  const dzLeft = document.getElementById('zone-dislike').getBoundingClientRect();
  const dzRight = document.getElementById('zone-like').getBoundingClientRect();
  const overLeft = e.clientX >= dzLeft.left && e.clientX <= dzLeft.right
    && e.clientY >= dzLeft.top && e.clientY <= dzLeft.bottom;
  const overRight = e.clientX >= dzRight.left && e.clientX <= dzRight.right
    && e.clientY >= dzRight.top && e.clientY <= dzRight.bottom;

  document.getElementById('zone-dislike').classList.toggle('active', overLeft);
  document.getElementById('zone-like').classList.toggle('active', overRight);
}

function onDragEnd(e) {
  if (!isDragging || !activeCard) return;
  isDragging = false;
  activeCard.removeEventListener('pointermove', onDragMove);
  activeCard.removeEventListener('pointerup', onDragEnd);
  activeCard.removeEventListener('pointercancel', onDragEnd);

  // Check drop zone
  const dzLeft = document.getElementById('zone-dislike').getBoundingClientRect();
  const dzRight = document.getElementById('zone-like').getBoundingClientRect();
  const overLeft = e.clientX >= dzLeft.left && e.clientX <= dzLeft.right
    && e.clientY >= dzLeft.top && e.clientY <= dzLeft.bottom;
  const overRight = e.clientX >= dzRight.left && e.clientX <= dzRight.right
    && e.clientY >= dzRight.top && e.clientY <= dzRight.bottom;

  document.getElementById('zone-dislike').classList.remove('active');
  document.getElementById('zone-like').classList.remove('active');

  if (overLeft) {
    dropVote('dislike');
  } else if (overRight) {
    dropVote('accept');
  } else {
    // Snap back
    activeCard.style.transform = '';
    activeCard.classList.remove('dragging');
    activeCard.classList.add('snap-back');
    setTimeout(() => {
      if (activeCard) {
        activeCard.style.position = '';
        activeCard.style.left = '';
        activeCard.style.top = '';
        activeCard.style.width = '';
        activeCard.style.zIndex = '';
        activeCard.classList.remove('snap-back');
      }
    }, 300);
  }
}

function dropVote(voteType) {
  const card = activeCard;
  const dishId = parseInt(card.dataset.dishId);

  // Fly off in the direction of the zone
  const dir = voteType === 'accept' ? 1 : -1;
  card.style.transform = `translate(${dir * 300}px, -150px) rotate(${dir * 20}deg)`;
  card.style.opacity = '0';
  card.style.transition = 'transform .35s ease, opacity .35s ease';

  submitVote(dishId, voteType);

  setTimeout(() => {
    card.remove();
    remainingDishes = remainingDishes.filter(d => d.id !== dishId);
    votedCount++;
    updateProgress();
    if (remainingDishes.length === 0) showResults();
  }, 350);
}

// ── Submit Neutral ──
function submitNeutral() {
  if (remainingDishes.length === 0) return;
  const dish = remainingDishes[0];
  const cardEl = document.getElementById('card-grid').firstElementChild;
  if (cardEl) {
    cardEl.style.transition = 'opacity .3s, transform .3s';
    cardEl.style.opacity = '0';
    cardEl.style.transform = 'translateY(20px)';
  }
  submitVote(dish.id, 'neutral');
  setTimeout(() => {
    if (cardEl) cardEl.remove();
    remainingDishes = remainingDishes.filter(d => d.id !== dish.id);
    votedCount++;
    updateProgress();
    if (remainingDishes.length === 0) showResults();
  }, 300);
}

// ── Submit Vote ──
async function submitVote(dishId, voteType) {
  try {
    await api('/api/vote', {
      method: 'POST',
      body: JSON.stringify({ user: userName, dish_id: dishId, vote_type: voteType })
    });
  } catch (e) {
    console.error('Vote failed:', e);
  }
}

// ── Results ──
async function showResults() {
  showScreen('results');
  const container = document.getElementById('screen-results');
  container.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>加载中...</p></div>';

  try {
    const [results, stats] = await Promise.all([
      api('/api/results'),
      api('/api/stats')
    ]);

    const maxAccepts = Math.max(1, ...results.map(r => r.accepts));

    let html = `
      <div class="results-header fade-in">
        <h2>🎉 投票结果</h2>
      </div>
      <div class="stats-row fade-in">
        <div class="stat"><div class="num">${stats.total_users}</div><div class="label">参与人数</div></div>
        <div class="stat"><div class="num">${stats.total_dishes}</div><div class="label">菜品总数</div></div>
        <div class="stat"><div class="num">${stats.total_votes}</div><div class="label">投票总数</div></div>
      </div>
    `;

    // Group by category
    const categories = ['凉菜', '热菜', '汤', '主食', '甜品'];
    const catEmoji = { '凉菜': '🥗', '热菜': '🔥', '汤': '🍲', '主食': '🍚', '甜品': '🍰' };
    const catColor = { '凉菜': '#22c55e', '热菜': '#f97316', '汤': '#14b8a6', '主食': '#6366f1', '甜品': '#ec4899' };

    for (const cat of categories) {
      const dishes = results.filter(r => r.category === cat);
      if (dishes.length === 0) continue;

      html += `<div class="category-section fade-in">
        <div class="category-title" style="color:${catColor[cat]}">
          ${catEmoji[cat]} ${cat}
        </div>`;

      for (const d of dishes) {
        const pct = d.accepts > 0 ? (d.accepts / maxAccepts * 100) : 0;
        html += `
          <div class="result-item">
            <div class="name">${d.name}</div>
            <div class="votes-bar"><div class="bar" style="width:${pct}%"></div></div>
            <div class="vote-count">${d.accepts > 0 ? '♥ ' + d.accepts : '-'}</div>
            <div class="vote-detail">${d.neutrals > 0 ? '○' + d.neutrals : ''}${d.neutrals > 0 && d.dislikes > 0 ? ' ' : ''}${d.dislikes > 0 ? '✕' + d.dislikes : ''}</div>
          </div>`;
      }
      html += '</div>';
    }

    html += `
      <div class="btn-row fade-in">
        <button class="btn-secondary" onclick="location.reload()">重新投票</button>
      </div>
    `;

    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<div class="empty-state"><div class="icon">⚠</div><p>加载失败，请刷新重试</p></div>';
  }
}

// ── Enter to Start ──
document.getElementById('nickname-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startVoting();
});
document.getElementById('custom-ingredient').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addCustomIngredient();
});
</script>
