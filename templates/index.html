<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Living Kitchen - 美食投票</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#0f0a1a;color:#e2e8f0;min-height:100dvh;overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;
}
button{cursor:pointer;border:none;font:inherit;color:inherit;background:none}
input{font:inherit;color:inherit}

:root{
  --cat-凉菜:#22c55e; --cat-热菜:#f97316; --cat-汤:#14b8a6;
  --cat-主食:#6366f1; --cat-甜品:#ec4899;
  --dislike:#ef4444;
  --glass:rgba(255,255,255,.06); --glass-border:rgba(255,255,255,.1);
}

#app{width:100%;max-width:520px;min-height:100dvh;display:flex;flex-direction:column;padding:0 16px}

.header{text-align:center;padding:20px 0 4px;flex-shrink:0}
.header h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#c084fc,#818cf8,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .subtitle{font-size:.8rem;color:#94a3b8;margin-top:2px}

.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex}

/* ═══ Welcome ═══ */
.welcome{flex:1;justify-content:center;align-items:center;gap:28px;padding:40px 0}
.welcome .logo{font-size:4rem;filter:drop-shadow(0 0 30px rgba(168,85,247,.4))}
.welcome h2{font-size:1.5rem;font-weight:700;text-align:center;line-height:1.4}
.welcome h2 span{background:linear-gradient(135deg,#c084fc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:#94a3b8;text-align:center;line-height:1.7;max-width:300px;font-size:.9rem}
.input-group{width:100%;max-width:300px}
.input-group input{
  width:100%;padding:14px 20px;border-radius:16px;
  background:var(--glass);border:1px solid var(--glass-border);
  color:#fff;font-size:1rem;outline:none;transition:border-color .3s,box-shadow .3s;
}
.input-group input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.2)}
.input-group input::placeholder{color:#64748b}
.btn-primary{
  width:100%;max-width:300px;padding:14px;border-radius:16px;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  font-size:1rem;font-weight:600;color:#fff;
  box-shadow:0 4px 20px rgba(99,102,241,.4);transition:transform .2s;
}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.5;pointer-events:none}

/* ═══ Vote ═══ */
.vote-screen{padding-top:10px;gap:10px}
.vote-title{text-align:center;font-size:1.1rem;font-weight:600;flex-shrink:0}
.vote-hint{text-align:center;font-size:.75rem;color:#64748b;flex-shrink:0;margin-top:-4px}

.summary-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;border-radius:12px;background:var(--glass);
  font-size:.8rem;color:#94a3b8;flex-shrink:0;
}
.summary-bar .count{color:#ef4444;font-weight:600}

.tag-container{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.tag-container::-webkit-scrollbar{width:4px}
.tag-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.cat-section{margin-bottom:14px}
.cat-header{
  display:flex;align-items:center;gap:6px;
  font-size:.8rem;font-weight:600;padding:4px 0 8px;
  border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:8px;
}
.tag-grid{display:flex;flex-wrap:wrap;gap:8px}

.dish-tag{
  padding:10px 16px;border-radius:12px;
  background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.08);
  font-size:.85rem;color:#cbd5e1;cursor:pointer;
  user-select:none;touch-action:manipulation;
  transition:all .2s ease;line-height:1.3;
}
.dish-tag:active{transform:scale(.95)}
.dish-tag.disliked{
  background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.5);
  color:#fca5a5;text-decoration:line-through;text-decoration-color:rgba(239,68,68,.4);
}

.vote-nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0 20px;flex-shrink:0;gap:12px;
}
.nav-btn{
  padding:10px 22px;border-radius:12px;font-size:.9rem;font-weight:500;
  background:var(--glass);border:1px solid var(--glass-border);
  transition:transform .2s,background .2s;
}
.nav-btn:active{transform:scale(.97)}
.nav-btn:disabled{opacity:.3;pointer-events:none}
.nav-btn.submit{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;color:#fff;font-weight:600;
  box-shadow:0 4px 16px rgba(34,197,94,.3);
}
.page-info{font-size:.8rem;color:#64748b;text-align:center;flex:1}

/* ═══ Results ═══ */
.results-screen{padding:8px 0 24px;gap:14px;overflow-y:auto}
.results-title{text-align:center;font-size:1.3rem;font-weight:700;flex-shrink:0}
.stats-row{display:flex;justify-content:center;gap:20px;flex-shrink:0}
.stat{text-align:center}
.stat .num{font-size:1.5rem;font-weight:700;color:#818cf8}
.stat .label{font-size:.7rem;color:#94a3b8;margin-top:2px}

.cat-section-r{margin-bottom:6px}
.cat-title-r{font-size:.82rem;font-weight:600;padding:6px 0 4px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px}
.result-item{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:10px;background:var(--glass);margin-bottom:3px;font-size:.82rem;
}
.result-item .name{flex:1;font-weight:500}
.result-item .bar-wrap{width:60px;height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;flex-shrink:0}
.result-item .bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ef4444,#f87171);transition:width .6s}
.result-item .dc{font-size:.78rem;color:#ef4444;font-weight:600;min-width:20px;text-align:right}
.result-item .dc.zero{color:#475569}

.btn-row{display:flex;gap:10px;justify-content:center;flex-shrink:0;padding:10px 0}
.btn-secondary{
  padding:12px 24px;border-radius:14px;
  background:var(--glass);border:1px solid var(--glass-border);
  font-size:.9rem;font-weight:500;transition:transform .2s;
}
.btn-secondary:active{transform:scale(.97)}

@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeInUp .4s ease}

@media(max-height:650px){
  .dish-tag{padding:8px 13px;font-size:.8rem}
  .cat-section{margin-bottom:10px}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Living Kitchen</h1>
    <div class="subtitle">2026 夏季美食投票</div>
  </div>

  <!-- Welcome -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome fade-in">
      <div class="logo">🍽</div>
      <h2>选出你想吃的<span>美食</span></h2>
      <p>点击你不喜欢的菜品<br>其余默认可接受，最后提交即可</p>
      <div class="input-group">
        <input id="nickname-input" type="text" placeholder="输入你的昵称" maxlength="20" autocomplete="off">
      </div>
      <button class="btn-primary" id="btn-start" onclick="startVoting()">开始投票</button>
    </div>
  </div>

  <!-- Vote -->
  <div id="screen-vote" class="screen vote-screen">
    <div class="vote-title">选出你不喜欢的菜品</div>
    <div class="vote-hint">点击标记不喜欢，未标记 = 可接受</div>
    <div class="summary-bar">
      <span>已选 <span class="count" id="dislike-count">0</span> 道不喜欢</span>
      <span id="total-info">共 0 道菜品</span>
    </div>
    <div class="tag-container" id="tag-container"></div>
    <div class="vote-nav">
      <button class="nav-btn" id="btn-prev" onclick="changePage(-1)">上一页</button>
      <span class="page-info" id="page-info"></span>
      <button class="nav-btn" id="btn-next" onclick="changePage(1)">下一页</button>
    </div>
  </div>

  <!-- Results -->
  <div id="screen-results" class="screen results-screen"></div>
</div>

<script>
const ITEMS_PER_PAGE = 15;
const catEmoji = {'凉菜':'🥗','热菜':'🔥','汤':'🍲','主食':'🍚','甜品':'🍰'};
const catColor = {'凉菜':'#22c55e','热菜':'#f97316','汤':'#14b8a6','主食':'#6366f1','甜品':'#ec4899'};

let userName = '';
let allDishes = [];
let pages = [];
let currentPage = 0;
let disliked = new Set();

async function api(url, opts) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ── Start ──
async function startVoting() {
  const input = document.getElementById('nickname-input');
  userName = input.value.trim();
  if (!userName) {
    input.style.borderColor = '#ef4444';
    input.style.boxShadow = '0 0 0 3px rgba(239,68,68,.2)';
    input.focus();
    return;
  }
  const btn = document.getElementById('btn-start');
  btn.disabled = true; btn.textContent = '加载中...';
  try {
    allDishes = await api('/api/dishes');
    const myVotes = await api('/api/my-votes?user=' + encodeURIComponent(userName));
    disliked = new Set(myVotes.filter(v => v.vote_type === 'dislike').map(v => v.dish_id));
    pages = buildPages(allDishes);
    currentPage = 0;
    document.getElementById('total-info').textContent = '共 ' + allDishes.length + ' 道菜品';
    showScreen('vote');
    renderPage();
    updateSummary();
  } catch (e) { alert('加载失败，请刷新重试'); }
  btn.disabled = false; btn.textContent = '开始投票';
}

// ── Pages ──
function buildPages(dishes) {
  const cats = ['凉菜','热菜','汤','主食','甜品'];
  const grouped = {};
  for (const c of cats) grouped[c] = dishes.filter(d => d.category === c);
  const pages = [];
  for (const cat of cats) {
    const items = grouped[cat] || [];
    if (!items.length) continue;
    for (let i = 0; i < items.length; i += ITEMS_PER_PAGE)
      pages.push({ category: cat, dishes: items.slice(i, i + ITEMS_PER_PAGE) });
  }
  return pages;
}

// ── Render ──
function renderPage() {
  const c = document.getElementById('tag-container');
  const p = pages[currentPage];
  if (!p) return;
  const color = catColor[p.category];
  let h = `<div class="cat-section fade-in">
    <div class="cat-header" style="color:${color}">${catEmoji[p.category]} ${p.category}</div>
    <div class="tag-grid">`;
  for (const d of p.dishes) {
    const cls = disliked.has(d.id) ? ' disliked' : '';
    h += `<div class="dish-tag${cls}" onclick="toggleDish(this,${d.id})">${d.name}</div>`;
  }
  h += '</div></div>';
  c.innerHTML = h;

  const isLast = currentPage === pages.length - 1;
  document.getElementById('btn-prev').disabled = currentPage === 0;
  const nb = document.getElementById('btn-next');
  if (isLast) { nb.textContent = '提交'; nb.className = 'nav-btn submit'; }
  else { nb.textContent = '下一页'; nb.className = 'nav-btn'; }
  document.getElementById('page-info').textContent = (currentPage+1) + ' / ' + pages.length;
  c.scrollTop = 0;
}

function toggleDish(el, id) {
  if (disliked.has(id)) { disliked.delete(id); el.classList.remove('disliked'); }
  else { disliked.add(id); el.classList.add('disliked'); }
  updateSummary();
}

function updateSummary() {
  document.getElementById('dislike-count').textContent = disliked.size;
}

function changePage(dir) {
  if (dir === 1 && currentPage === pages.length - 1) { submitVotes(); return; }
  currentPage = Math.max(0, Math.min(pages.length - 1, currentPage + dir));
  renderPage();
}

// ── Submit ──
async function submitVotes() {
  const nb = document.getElementById('btn-next');
  nb.disabled = true; nb.textContent = '提交中...';
  try {
    await api('/api/vote/bulk', {
      method: 'POST',
      body: JSON.stringify({ user: userName, dislikes: [...disliked] })
    });
    showResults();
  } catch (e) { alert('提交失败，请重试'); }
  nb.disabled = false;
}

// ── Results ──
async function showResults() {
  showScreen('results');
  const c = document.getElementById('screen-results');
  c.innerHTML = '<div style="text-align:center;padding:40px;color:#64748b">加载中...</div>';
  try {
    const [results, stats] = await Promise.all([api('/api/results'), api('/api/stats')]);
    const mx = Math.max(1, ...results.map(r => r.dislikes));
    let h = `<div class="results-title fade-in">🎉 投票结果</div>
      <div class="stats-row fade-in">
        <div class="stat"><div class="num">${stats.total_users}</div><div class="label">参与人数</div></div>
        <div class="stat"><div class="num">${stats.total_dishes}</div><div class="label">菜品总数</div></div>
        <div class="stat"><div class="num">${stats.total_votes}</div><div class="label">不喜欢总数</div></div>
      </div>`;
    for (const cat of ['凉菜','热菜','汤','主食','甜品']) {
      const ds = results.filter(r => r.category === cat);
      if (!ds.length) continue;
      h += `<div class="cat-section-r fade-in">
        <div class="cat-title-r" style="color:${catColor[cat]}">${catEmoji[cat]} ${cat}</div>`;
      for (const d of ds) {
        const pct = d.dislikes > 0 ? (d.dislikes / mx * 100) : 0;
        const z = d.dislikes === 0 ? ' zero' : '';
        h += `<div class="result-item">
          <div class="name">${d.name}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
          <div class="dc${z}">${d.dislikes > 0 ? '✕'+d.dislikes : '-'}</div>
        </div>`;
      }
      h += '</div>';
    }
    h += `<div class="btn-row fade-in"><button class="btn-secondary" onclick="location.reload()">重新投票</button></div>`;
    c.innerHTML = h;
  } catch (e) {
    c.innerHTML = '<div style="text-align:center;padding:40px;color:#64748b">加载失败，请刷新</div>';
  }
}

document.addEventListener('keydown', e => {
  if (document.getElementById('screen-vote').classList.contains('active')) {
    if (e.key === 'ArrowLeft') changePage(-1);
    else if (e.key === 'ArrowRight') changePage(1);
  }
});
document.getElementById('nickname-input').addEventListener('keydown', e => { if (e.key === 'Enter') startVoting(); });
</script>
</body>
</html>
