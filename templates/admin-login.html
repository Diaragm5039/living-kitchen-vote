<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Kitchen - 管理员登录</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#0f0a1a;color:#e2e8f0;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.login-box{
  max-width:360px;width:90%;text-align:center;
  padding:40px 24px;border-radius:24px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
}
.login-box h2{font-size:1.3rem;margin-bottom:8px}
.login-box p{color:#94a3b8;font-size:.85rem;margin-bottom:24px}
.login-box input{
  width:100%;padding:12px 16px;border-radius:12px;margin-bottom:12px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:#fff;font-size:1rem;outline:none;
}
.login-box input:focus{border-color:#818cf8}
.btn{
  width:100%;padding:12px;border-radius:12px;font-size:1rem;font-weight:500;
  cursor:pointer;border:none;color:#fff;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  box-shadow:0 2px 10px rgba(99,102,241,.3);transition:all .2s;
}
.btn:hover{box-shadow:0 4px 20px rgba(99,102,241,.5)}
.btn:active{transform:scale(.97)}
.login-error{color:#ef4444;font-size:.8rem;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <div style="font-size:2.5rem;margin-bottom:12px">🔐</div>
  <h2>管理员登录</h2>
  <p>请输入管理员密码以访问后台</p>
  <input type="password" id="login-password" placeholder="输入密码" autocomplete="off">
  <button class="btn" onclick="doLogin()">登录</button>
  <div class="login-error" id="login-error">密码错误，请重试</div>
</div>
<script>
async function doLogin() {
  const pw = document.getElementById('login-password').value;
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (res.ok) { location.href = '/admin'; }
    else { document.getElementById('login-error').style.display = 'block'; }
  } catch (e) {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
